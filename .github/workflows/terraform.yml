name: 'Terraform Infrastructure Deployment'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  TF_VERSION: 'latest'

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash
        working-directory: .

    outputs:
      aws_region: ${{ steps.tfvars.outputs.aws_region }}
      tf_state_bucket: ${{ steps.tfvars.outputs.tf_state_bucket }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract Terraform Variables
      id: tfvars
      run: |
        if [ -f "terraform.tfvars" ]; then
          AWS_REGION=$(grep 'aws_region' terraform.tfvars | cut -d'"' -f2)
          TF_STATE_BUCKET=$(grep 'terraform_state_bucket' terraform.tfvars | cut -d'"' -f2)
          echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
          echo "tf_state_bucket=$TF_STATE_BUCKET" >> $GITHUB_OUTPUT
          echo "✅ Extracted: Region=$AWS_REGION, Bucket=$TF_STATE_BUCKET"
        else
          echo "❌ terraform.tfvars not found!"
          exit 1
        fi

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ steps.tfvars.outputs.aws_region }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=${{ steps.tfvars.outputs.tf_state_bucket }}" \
          -backend-config="key=docmp/terraform.tfstate" \
          -backend-config="region=${{ steps.tfvars.outputs.aws_region }}" \
          -backend-config="encrypt=true"

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true

    - name: Terraform Plan
      id: plan
      run: |
        terraform plan -var-file="terraform.tfvars" -out=tfplan
        terraform show -no-color tfplan > plan-output.txt

    - name: Upload Terraform Plan
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: |
          tfplan
          plan-output.txt
        retention-days: 5

    - name: Comment Plan on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('plan-output.txt', 'utf8');
          const output = `#### Terraform Plan 📋
          <details><summary>Show Plan</summary>
          
          \`\`\`terraform
          ${plan}
          \`\`\`
          
          </details>
          
          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ needs.terraform-plan.outputs.aws_region }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=${{ needs.terraform-plan.outputs.tf_state_bucket }}" \
          -backend-config="key=docmp/terraform.tfstate" \
          -backend-config="region=${{ needs.terraform-plan.outputs.aws_region }}" \
          -backend-config="encrypt=true"

    - name: Download Terraform Plan
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan

    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan

    - name: Terraform Output
      run: terraform output -json > terraform-outputs.json

    - name: Upload Terraform Outputs
      uses: actions/upload-artifact@v4
      with:
        name: terraform-outputs
        path: terraform-outputs.json
        retention-days: 30

  build-db-init-image:
    name: 'Build DB Init Docker Image'
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Extract configuration from terraform.tfvars
    - name: Extract Terraform Variables
      id: tfvars
      run: |
        AWS_REGION=$(grep 'aws_region' terraform.tfvars | cut -d'"' -f2)
        PROJECT_NAME=$(grep 'project_name' terraform.tfvars | cut -d'"' -f2)
        echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
        echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
        echo "✅ Extracted: Region=$AWS_REGION, Project=$PROJECT_NAME"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ steps.tfvars.outputs.aws_region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push DB init image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ steps.tfvars.outputs.project_name }}-app-db-init
        IMAGE_TAG: latest
      run: |
        cd scripts
        docker build -f Dockerfile.db-init -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

