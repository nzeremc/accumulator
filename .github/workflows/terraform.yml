name: 'Terraform Infrastructure Deployment'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  TF_VERSION: '1.9.0'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    
    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # Debug: Print working directory and files
    - name: Debug - Show Directory
      run: |
        echo "Current directory: $(pwd)"
        echo "Files in current directory:"
        ls -la
        echo "Checking for terraform.tfvars:"
        ls -la terraform.tfvars || echo "terraform.tfvars not found"

    # Extract configuration from terraform.tfvars
    - name: Extract Terraform Variables
      id: tfvars
      run: |
        if [ -f "terraform.tfvars" ]; then
          AWS_REGION=$(grep 'aws_region' terraform.tfvars | cut -d'"' -f2)
          TF_STATE_BUCKET=$(grep 'terraform_state_bucket' terraform.tfvars | cut -d'"' -f2)
          echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
          echo "tf_state_bucket=$TF_STATE_BUCKET" >> $GITHUB_OUTPUT
          echo "✅ Extracted: Region=$AWS_REGION, Bucket=$TF_STATE_BUCKET"
        else
          echo "❌ terraform.tfvars not found!"
          exit 1
        fi

    # Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ steps.tfvars.outputs.aws_region }}

    # Install the latest version of Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    # Initialize a new or existing Terraform working directory
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=${{ steps.tfvars.outputs.tf_state_bucket }}" \
          -backend-config="key=docmp/terraform.tfstate" \
          -backend-config="region=${{ steps.tfvars.outputs.aws_region }}" \
          -backend-config="encrypt=true"

    # Format check
    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true

    # Generate and show an execution plan
    - name: Terraform Plan
      id: plan
      run: terraform plan -var-file="terraform.tfvars" -out=tfplan
      continue-on-error: false

    # Save plan for review
    - name: Upload Terraform Plan
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: tfplan
        retention-days: 5

    # Apply the Terraform plan (requires manual approval via environment protection)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve tfplan

    # Output the results
    - name: Terraform Output
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform output -json > terraform-outputs.json

    # Upload outputs as artifact
    - name: Upload Terraform Outputs
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: terraform-outputs
        path: terraform-outputs.json
        retention-days: 30

  build-db-init-image:
    name: 'Build DB Init Docker Image'
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Extract configuration from terraform.tfvars
    - name: Extract Terraform Variables
      id: tfvars
      run: |
        AWS_REGION=$(grep 'aws_region' terraform.tfvars | cut -d'"' -f2)
        PROJECT_NAME=$(grep 'project_name' terraform.tfvars | cut -d'"' -f2)
        echo "aws_region=$AWS_REGION" >> $GITHUB_OUTPUT
        echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
        echo "✅ Extracted: Region=$AWS_REGION, Project=$PROJECT_NAME"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ steps.tfvars.outputs.aws_region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push DB init image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ steps.tfvars.outputs.project_name }}-app-db-init
        IMAGE_TAG: latest
      run: |
        cd scripts
        docker build -f Dockerfile.db-init -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

